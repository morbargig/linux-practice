name: Lesson exercise suite

# Invoked once per lesson from exercise-tests.yml; prepares lab once then runs exercises sequentially on one runner.
on:
  workflow_call:
    inputs:
      lesson_dir:
        description: Lesson folder basename under exercises/
        required: true
        type: string
      lesson_job_title:
        description: Title for this reusable workflow run (lesson row)
        required: true
        type: string
      lesson_cache_key:
        description: Stable ASCII id for lab tarball artifact (outer matrix key, e.g. 01__lesson)
        required: true
        type: string

run-name: "${{ inputs.lesson_job_title }}"

permissions:
  contents: read
  actions: write # actions/cache save/restore for APT archives

jobs:
  discover_exercises:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover exercises for lesson
        id: set_matrix
        env:
          CI_DISCOVER_SCOPE: lesson_exercises
          CI_LESSON_DIR: ${{ inputs.lesson_dir }}
        run: bash scripts/ci-discover-matrix.sh

  # One setup.sh + dd big.bin per lesson; tarball reused between exercises on the sequential runner below.
  prepare_lesson:
    name: Prepare lab (${{ inputs.lesson_cache_key }})
    needs: discover_exercises
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup.sh once for this lesson
        run: bash scripts/setup.sh

      - name: Pack lab snapshot
        run: tar czf lesson-lab.tgz lab/

      - name: Upload lab snapshot
        uses: actions/upload-artifact@v4
        with:
          name: lesson-lab-${{ inputs.lesson_cache_key }}
          path: lesson-lab.tgz

  # Single runner per lesson: APT/tooling once; exercises run strictly in order with lab restored each time.
  run_lesson_exercises:
    name: ${{ inputs.lesson_job_title }} — sequential exercises
    needs:
      - discover_exercises
      - prepare_lesson
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache APT archives and lists
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/ci-apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install tooling used by exercises and harness
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends tree jq iproute2

      - name: Download lab snapshot from prepare_lesson
        uses: actions/download-artifact@v4
        with:
          name: lesson-lab-${{ inputs.lesson_cache_key }}
          path: downloaded/

      - name: Run exercises sequentially (one install; ordered lab restores)
        id: sequential_tests
        env:
          MATRIX_JSON: ${{ needs.discover_exercises.outputs.matrix }}
          LESSON_DIR: ${{ inputs.lesson_dir }}
          LAB_ARCHIVE: downloaded/lesson-lab.tgz
          PROGRESS_STUDENT_ID: ${{ github.actor }}
        run: bash scripts/ci-run-lesson-exercises-sequential.sh
        continue-on-error: true

      - name: Upload NDJSON fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-ndjson-${{ inputs.lesson_cache_key }}
          path: reports/.last-run.ndjson
          if-no-files-found: ignore

      - name: Lesson exercise summary
        if: always()
        run: |
          {
            echo "### ${{ inputs.lesson_job_title }}"
            echo ""
            echo "- **Outcome:** ${{ steps.sequential_tests.outcome }}"
            echo "- **Runner:** single job — APT/cache once per lesson; exercises **serial** (never parallel)."
            echo "- **NDJSON artifact:** \`matrix-ndjson-${{ inputs.lesson_cache_key }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Propagate test failure
        if: steps.sequential_tests.outcome != 'success'
        run: exit 1
