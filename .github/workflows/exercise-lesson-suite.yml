name: Lesson exercise suite

# Invoked once per lesson from exercise-tests.yml — single runner runs exercises in order.
on:
  workflow_call:
    inputs:
      lesson_dir:
        description: Lesson folder basename under exercises/
        required: true
        type: string
      lesson_job_title:
        description: Title for this reusable workflow run (lesson row)
        required: true
        type: string
      lesson_matrix_key:
        description: Stable key for NDJSON artifact (e.g. 01__lesson)
        required: true
        type: string

run-name: "${{ inputs.lesson_job_title }}"

permissions:
  contents: read
  actions: write # actions/cache save/restore for APT archives

jobs:
  run_lesson_ordered:
    name: ${{ inputs.lesson_job_title }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache APT archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-archives-${{ hashFiles('.github/ci-apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-archives-

      - name: Install tooling used by exercises and harness
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends tree jq iproute2

      - name: Prepare lab fixtures
        run: bash scripts/setup.sh

      - name: Run exercises in order (single runner)
        id: lesson_run
        env:
          LESSON_DIR: ${{ inputs.lesson_dir }}
          PROGRESS_STUDENT_ID: ${{ github.actor }}
        run: bash scripts/ci-run-lesson-exercises-on-runner.sh

      - name: Upload lesson NDJSON bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-ndjson-${{ inputs.lesson_matrix_key }}
          path: reports/.last-run.ndjson
          if-no-files-found: ignore

      - name: Lesson summary
        if: always()
        run: |
          {
            echo "### ${{ inputs.lesson_job_title }}"
            echo ""
            echo "- **Runner:** single VM; exercises executed **sequentially** in slug order."
            echo "- **Step outcome:** ${{ steps.lesson_run.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -f reports/.last-run.ndjson ]] && [[ -s reports/.last-run.ndjson ]]; then
            p="$(grep -c '"status":"pass"' reports/.last-run.ndjson || true)"
            f="$(grep -c '"status":"fail"' reports/.last-run.ndjson || true)"
            s="$(grep -c '"status":"skip"' reports/.last-run.ndjson || true)"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Totals this lesson:** pass \`$p\` · fail \`$f\` · skip \`$s\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Propagate lesson failures
        if: steps.lesson_run.outcome != 'success'
        run: exit 1
