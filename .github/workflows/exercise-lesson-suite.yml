name: Lesson exercise suite

# Invoked once per lesson from exercise-tests.yml.
# One runner per lesson: checkout → APT (cached archives) → setup.sh → full lesson harness.
# Sequential exercise matrix jobs were removed — they restarted a VM each time and repeated APT
# despite max-parallel: 1 (GitHub Actions matrix = separate jobs).
on:
  workflow_call:
    inputs:
      lesson_dir:
        description: Lesson folder basename under exercises/
        required: true
        type: string
      lesson_job_title:
        description: Title for this reusable workflow run (lesson row)
        required: true
        type: string
      lesson_cache_key:
        description: Stable ASCII id for NDJSON artifact (outer matrix key, e.g. 01__lesson)
        required: true
        type: string

run-name: "${{ inputs.lesson_job_title }}"

permissions:
  contents: read
  actions: write # actions/cache save/restore for APT archives

jobs:
  lesson_exercises:
    name: ${{ inputs.lesson_job_title }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache APT archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-archives-${{ hashFiles('.github/ci-apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-archives-

      - name: Install tooling used by exercises and harness
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends tree jq iproute2

      - name: Prepare lab fixtures once
        run: bash scripts/setup.sh

      - name: Run all exercises for this lesson
        id: lesson_tests
        env:
          PROGRESS_STUDENT_ID: ${{ github.actor }}
          RUN_LESSON_DIR: ${{ inputs.lesson_dir }}
        run: bash scripts/run-all-tests.sh
        continue-on-error: true

      - name: Upload NDJSON fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-ndjson-${{ inputs.lesson_cache_key }}
          path: reports/.last-run.ndjson
          if-no-files-found: ignore

      - name: Cell summary
        if: always()
        run: |
          {
            echo "### ${{ inputs.lesson_job_title }}"
            echo ""
            echo "- **Outcome:** ${{ steps.lesson_tests.outcome }}"
            echo "- **Lesson:** \`${{ inputs.lesson_dir }}\` (all exercises in one job)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Propagate test failure
        if: steps.lesson_tests.outcome != 'success'
        run: exit 1
