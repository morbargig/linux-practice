name: Lesson exercise suite

# One runner per lesson: installs deps once, runs exercises sequentially, merges NDJSON for aggregation.
on:
  workflow_call:
    inputs:
      lesson_dir:
        description: Lesson folder basename under exercises/
        required: true
        type: string
      lesson_job_title:
        description: Title for this reusable workflow run (lesson row)
        required: true
        type: string
      lesson_matrix_key:
        description: Stable key from root discovery (artifact prefix), e.g. 01__lesson
        required: true
        type: string

run-name: "${{ inputs.lesson_job_title }}"

permissions:
  contents: read
  actions: write # actions/cache save/restore for APT archives

jobs:
  exercises_for_lesson:
    name: ${{ inputs.lesson_job_title }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache APT archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-archives-${{ hashFiles('.github/ci-apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-archives-

      - name: Install tooling used by exercises and harness
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends tree jq iproute2

      - name: Prepare lab fixtures
        run: bash scripts/setup.sh

      - name: Run all exercises in lesson order (single runner)
        id: lesson_run
        env:
          PROGRESS_STUDENT_ID: ${{ github.actor }}
          LESSON_DIR: ${{ inputs.lesson_dir }}
        run: bash scripts/ci-run-lesson-exercises.sh
        continue-on-error: true

      - name: Upload NDJSON fragment for lesson
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-ndjson-${{ inputs.lesson_matrix_key }}
          path: reports/.last-run.ndjson
          if-no-files-found: ignore

      - name: Lesson summary
        if: always()
        run: |
          {
            echo "### ${{ inputs.lesson_job_title }}"
            echo ""
            echo "- **Runner:** single VM — apt + \`setup.sh\` once; exercises run **sequentially** (\`ci-run-lesson-exercises.sh\`)."
            echo "- **Outcome:** ${{ steps.lesson_run.outcome }}"
            if [[ -f reports/.last-run.ndjson ]]; then
              echo "- **NDJSON lines:** $(wc -l < reports/.last-run.ndjson)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Propagate failures
        if: steps.lesson_run.outcome != 'success'
        run: exit 1
