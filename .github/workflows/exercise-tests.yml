name: Exercise tests

# Single runner: one checkout, one APT setup, one setup.sh, full harness (all lessons/exercises).
on:
  push:
    branches: ["**"]
    paths:
      - "exercises/**"
      - "scripts/**"
      - "lab/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/exercise-tests.yml"
      - ".github/ci-apt-packages.txt"
  pull_request:
    branches: [main, master]
    paths:
      - "exercises/**"
      - "scripts/**"
      - "lab/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/exercise-tests.yml"
      - ".github/ci-apt-packages.txt"
  workflow_dispatch:

permissions:
  contents: read
  actions: write # actions/cache for APT archives

jobs:
  exercises:
    name: Exercise tests (single runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache APT archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-archives-${{ hashFiles('.github/ci-apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-archives-

      - name: Install tooling used by exercises and harness
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends tree jq iproute2

      - name: Prepare lab fixtures
        run: bash scripts/setup.sh

      - name: Run all exercise tests + reports
        id: tests
        continue-on-error: true
        env:
          PROGRESS_STUDENT_ID: ${{ github.actor }}
        run: bash scripts/run-all-tests.sh

      - name: Upload progress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progress-reports
          path: |
            reports/progress-report.md
            reports/progress.json
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          if [[ -f reports/progress.json ]]; then
            {
              echo "### Exercise CI"
              echo ""
              jq -r '"**Overall:** \(.summary.passed) passed, \(.summary.failed) failed, \(.summary.skipped) skipped — **\(.summary.percent)%** graded progress"' reports/progress.json
              echo ""
              echo "Download the **progress-reports** artifact for Markdown + JSON."
            } >> "$GITHUB_STEP_SUMMARY"
            bash scripts/ci-append-lesson-overview-to-summary.sh reports/progress.json
          fi

      - name: Enforce success
        if: always()
        run: |
          if [[ "${{ steps.tests.outcome }}" != "success" ]]; then
            echo "Exercise tests step outcome: ${{ steps.tests.outcome }}"
            exit 1
          fi
