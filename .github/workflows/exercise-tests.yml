name: Exercise tests

on:
  push:
    branches: ["**"]
    paths:
      - "exercises/**"
      - "scripts/**"
      - "lab/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/exercise-tests.yml"
      - ".github/workflows/exercise-lesson-suite.yml"
      - ".github/ci-apt-packages.txt"
  pull_request:
    branches: [main, master]
    paths:
      - "exercises/**"
      - "scripts/**"
      - "lab/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/exercise-tests.yml"
      - ".github/workflows/exercise-lesson-suite.yml"
      - ".github/ci-apt-packages.txt"
  workflow_dispatch:

permissions:
  contents: read
  actions: write # actions/cache for APT archives on aggregate job

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover lessons matrix
        id: set_matrix
        env:
          CI_DISCOVER_SCOPE: root_lessons
        run: bash scripts/ci-discover-matrix.sh

  # One invocation per lesson (sequential). Each reusable run uses ONE runner for all exercises in that lesson.
  lesson_suite:
    name: ${{ matrix.job_title }}
    needs: discover
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/exercise-lesson-suite.yml
    secrets: inherit
    with:
      lesson_dir: ${{ matrix.lesson_dir }}
      lesson_job_title: ${{ matrix.job_title }}
      lesson_key: ${{ matrix.key }}

  aggregate_reports:
    name: Aggregate progress reports
    needs: lesson_suite
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: matrix-ndjson-*
          merge-multiple: true
          path: artifacts/

      - name: Cache APT archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-archives-${{ hashFiles('.github/ci-apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-archives-

      - name: Merge NDJSON and generate reports
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq
          mkdir -p reports
          mapfile -t files < <(find artifacts -type f -name '.last-run.ndjson' | LC_ALL=C sort || true)
          if ((${#files[@]} == 0)); then
            echo "### Aggregate warning" >> "$GITHUB_STEP_SUMMARY"
            echo "No NDJSON fragments were found (no \`.last-run.ndjson\` under downloaded artifacts)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          cat "${files[@]}" > reports/.last-run.ndjson
          bash scripts/generate-progress-report.sh

      - name: Upload combined progress artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progress-reports
          path: |
            reports/progress-report.md
            reports/progress.json
          if-no-files-found: ignore

      - name: Combined job summary
        if: always()
        run: |
          if [[ -f reports/progress.json ]]; then
            {
              echo "### Exercise CI — combined"
              echo ""
              jq -r '"**Overall:** \(.summary.passed) passed, \(.summary.failed) failed, \(.summary.skipped) skipped — **\(.summary.percent)%** graded progress"' reports/progress.json
              echo ""
              echo "Download the **progress-reports** artifact for Markdown + JSON."
            } >> "$GITHUB_STEP_SUMMARY"
            bash scripts/ci-append-lesson-overview-to-summary.sh reports/progress.json
          fi

  enforce_success:
    name: Workflow gate
    needs: lesson_suite
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any lesson suite or exercise cell failed
        run: |
          if [[ "${{ needs.lesson_suite.result }}" != "success" ]]; then
            echo "One or more lesson suites or exercise jobs failed (result=${{ needs.lesson_suite.result }})."
            exit 1
          fi
